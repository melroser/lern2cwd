<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <form name="request-access" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="request-access" />
      <input type="hidden" name="subject" value="lern2cwd waitlist request" />
      <input type="email" name="email" />
      <input type="text" name="source_path" />
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
