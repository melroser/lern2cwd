# example netlify.toml
[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[build.environment]
  VITE_AUTH_PROVIDER = "netlify"
  VITE_NETLIFY_PUBLIC_SIGNUP = "false"

  # Configure the production AI key in Netlify UI:
  # Site configuration -> Environment variables -> OPENAI_API_KEY

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev -- --host 127.0.0.1 --port 45173"
  targetPort = 45173
  publish = "dist"

  ## more info on configuring this file: https://ntl.fyi/file-based-build-config
