<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 100vw; 
      height: 100vh; 
      overflow: hidden;
      font-family: system-ui;
    }
    
    /* Main container */
    .app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    
    /* Header bar */
    .header {
      height: 60px;
      background: #181825;
      border-bottom: 1px solid #45475a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    
    /* Main content area - horizontal split */
    .content {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }
    
    /* Left side - code editor */
    .editor {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #45475a;
      overflow: hidden;
    }
    
    /* Right side - chat */
    .chat {
      width: 400px;
      display: flex;
      flex-direction: column;
      background: #181825;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div>FizzBuzz | Time: 09:32</div>
      <button>Settings</button>
    </div>
    
    <!-- Main content - side by side -->
    <div class="content">
      <!-- Left: Code Editor -->
      <div class="editor">
        <div style="padding: 20px; background: #181825;">
          <h3>PROBLEM</h3>
          <p>Write a function...</p>
        </div>
        <div style="flex: 1; background: #282a36; padding: 20px;">
          <pre>def fizz_buzz(n: int) -> list[str]:
    # Your code here
    pass</pre>
        </div>
        <button style="margin: 20px;">I'm Done</button>
      </div>
      
      <!-- Right: Chat -->
      <div class="chat">
        <div style="padding: 20px; border-bottom: 1px solid #45475a;">
          <h3>CHAT WITH PROCTOR</h3>
        </div>
        <div style="flex: 1; padding: 20px; overflow-y: auto;">
          <div style="background: #45475a; padding: 15px; border-radius: 8px;">
            <strong>PROCTOR:</strong>
            <p>Hi there! Welcome to your coding assessment...</p>
          </div>
        </div>
        <div style="padding: 20px;">
          <input type="text" placeholder="Type your message..." style="width: 100%; padding: 10px;">
        </div>
      </div>
    </div>
  </div>
</body>
</html>
