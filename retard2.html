<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Interview Simulator Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            overflow: hidden;
            height: 100vh;
        }
        
        .app { display: flex; flex-direction: column; height: 100vh; }
        
        /* Header */
        .header {
            background: #1e293b;
            border-bottom: 2px solid #475569;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .timer {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            padding: 8px 20px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 16px;
            min-width: 90px;
            text-align: center;
        }
        
        .timer.warning { background: linear-gradient(135deg, #f59e0b, #ef4444); }
        
        .problem-info h2 { font-size: 16px; margin-bottom: 4px; }
        .problem-meta { font-size: 12px; color: #94a3b8; }
        
        button {
            background: #334155;
            color: #f1f5f9;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        button:hover { background: #475569; }
        button.primary { background: #3b82f6; }
        button.primary:hover { background: #2563eb; }
        button.success { background: #10b981; }
        button.danger { background: #ef4444; }
        
        /* Layout */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #475569;
        }
        
        .right-panel {
            width: 400px;
            display: flex;
            flex-direction: column;
            background: #1e293b;
        }
        
        /* Problem Description */
        .problem-desc {
            padding: 20px;
            overflow: auto;
            background: #1e293b;
            flex: 1;
        }
        
        .problem-desc h3 { color: #3b82f6; margin-bottom: 12px; }
        .problem-desc p { line-height: 1.6; margin-bottom: 12px; }
        
        /* Editor */
        .editor-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .editor-toolbar {
            background: #1e293b;
            padding: 8px 16px;
            border-bottom: 1px solid #475569;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .editor-toolbar select {
            background: #0f172a;
            color: #f1f5f9;
            border: 1px solid #475569;
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        .editor-container {
            flex: 1;
            position: relative;
        }
        
        .CodeMirror {
            height: 100% !important;
            font-size: 14px;
        }
        
        .editor-footer {
            background: #1e293b;
            padding: 12px 20px;
            border-top: 2px solid #475569;
            display: flex;
            justify-content: space-between;
        }
        
        /* Chat */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user { flex-direction: row-reverse; }
        
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .message.user .avatar { background: linear-gradient(135deg, #10b981, #059669); }
        
        .bubble {
            background: #334155;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 75%;
            line-height: 1.5;
            font-size: 14px;
        }
        
        .message.user .bubble { background: #3b82f6; }
        
        .typing {
            display: flex;
            gap: 4px;
            padding: 8px;
        }
        
        .typing span {
            width: 6px;
            height: 6px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
        
        .chat-input {
            padding: 12px;
            border-top: 2px solid #475569;
            display: flex;
            gap: 8px;
        }
        
        .chat-input textarea {
            flex: 1;
            background: #0f172a;
            color: #f1f5f9;
            border: 1px solid #475569;
            border-radius: 6px;
            padding: 8px;
            resize: none;
            font-family: inherit;
            font-size: 13px;
        }
        
        /* Home Screen */
        .home-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            overflow: auto;
        }
        
        .home-screen h1 {
            font-size: 42px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .home-screen > p { font-size: 16px; color: #94a3b8; margin-bottom: 30px; }
        
        .problem-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 1000px;
            margin-top: 30px;
        }
        
        .problem-card {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .problem-card:hover {
            border-color: #3b82f6;
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }
        
        .problem-card h3 { margin-bottom: 8px; font-size: 18px; }
        
        .difficulty {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .difficulty.easy { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .difficulty.medium { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .difficulty.hard { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: #1e293b;
            border-radius: 12px;
            padding: 28px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow: auto;
        }
        
        .modal-content h2 { margin-bottom: 20px; color: #3b82f6; }
        
        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            background: #0f172a;
            color: #f1f5f9;
            border: 1px solid #475569;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .modal-content label {
            display: block;
            margin-bottom: 6px;
            color: #94a3b8;
            font-size: 13px;
        }
        
        .setting-group {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }
        
        .setting-group:last-child { border-bottom: none; }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            margin-bottom: 8px;
        }
        
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        /* Review */
        .review-panel {
            padding: 24px;
            overflow: auto;
        }
        
        .score-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        
        .score-card {
            background: #1e293b;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #334155;
        }
        
        .score-card .label { font-size: 11px; color: #94a3b8; margin-bottom: 6px; }
        .score-card .value { font-size: 28px; font-weight: 700; color: #3b82f6; }
        
        .feedback-section {
            background: #1e293b;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        
        .feedback-section h3 { margin-bottom: 10px; color: #3b82f6; font-size: 16px; }
        .feedback-section ul { margin-left: 20px; line-height: 1.7; }
        
        /* History */
        .history-list {
            max-height: 400px;
            overflow: auto;
        }
        
        .history-item {
            background: #0f172a;
            padding: 14px;
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 2px solid #334155;
            transition: all 0.2s;
        }
        
        .history-item:hover {
            border-color: #3b82f6;
            transform: translateX(4px);
        }
        
        .history-item h4 { margin-bottom: 6px; font-size: 15px; }
        .history-item .meta {
            font-size: 12px;
            color: #94a3b8;
            display: flex;
            gap: 12px;
        }
        
        .hidden { display: none !important; }
        
        .header-left,
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        @media (max-width: 768px) {
            .main { flex-direction: column; }
            .right-panel { 
                width: 100%; 
                height: 40%; 
                border-right: none; 
                border-top: 2px solid #475569; 
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Home Screen -->
        <div class="home-screen" id="homeScreen">
            <h1>🚀 Interview Simulator</h1>
            <p>Practice coding interviews with AI feedback</p>
            
            <div style="display: flex; gap: 12px;">
                <button class="primary" onclick="showSettings()">⚙️ Settings</button>
                <button onclick="showHistory()">📊 History</button>
            </div>
            
            <div class="problem-grid" id="problemGrid"></div>
        </div>
        
        <!-- Interview Screen -->
        <div class="hidden" id="interviewScreen">
            <div class="header">
                <div class="header-left">
                    <div class="timer" id="timer">25:00</div>
                    <div class="problem-info">
                        <h2 id="problemTitle">Problem</h2>
                        <div class="problem-meta" id="problemMeta">Easy • 25 min</div>
                    </div>
                </div>
                <div class="header-actions">
                    <button onclick="showSettings()">⚙️</button>
                    <button class="success" onclick="submitCode()">✅ Submit</button>
                    <button class="danger" onclick="endSession()">❌ End</button>
                </div>
            </div>
            
            <div class="main">
                <div class="left-panel">
                    <div class="problem-desc" id="problemDesc"></div>
                    <div class="editor-wrapper">
                        <div class="editor-toolbar">
                            <div>
                                <select id="langSelect" onchange="changeLang()">
                                    <option value="python">Python</option>
                                    <option value="javascript">JavaScript</option>
                                </select>
                                <label class="checkbox-label" style="display: inline-flex; margin-left: 12px;">
                                    <input type="checkbox" id="vimMode" onchange="toggleVim()"> Vim
                                </label>
                            </div>
                            <button onclick="resetCode()">🔄 Reset</button>
                        </div>
                        <div class="editor-container">
                            <textarea id="codeEditor"></textarea>
                        </div>
                        <div class="editor-footer">
                            <span id="charCount" style="font-size: 12px; color: #94a3b8;">0 chars</span>
                            <button class="success" onclick="submitCode()">✅ Submit</button>
                        </div>
                    </div>
                </div>
                
                <div class="right-panel">
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input">
                        <textarea id="chatInput" placeholder="Ask a question..." rows="2" onkeydown="chatKeydown(event)"></textarea>
                        <button class="primary" onclick="sendMsg()">Send</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Review Screen -->
        <div class="hidden" id="reviewScreen">
            <div class="header">
                <h2>📊 Review</h2>
                <div class="header-actions">
                    <button class="primary" onclick="newSession()">New Problem</button>
                    <button onclick="goHome()">Home</button>
                </div>
            </div>
            <div class="review-panel" id="reviewPanel"></div>
        </div>
    </div>
    
    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h2>⚙️ Settings</h2>
            <div class="setting-group">
                <label>API Provider</label>
                <select id="apiProvider">
                    <option value="openai">OpenAI</option>
                    <option value="anthropic">Anthropic</option>
                </select>
                <label>API Key</label>
                <input type="password" id="apiKey" placeholder="sk-...">
                <p style="font-size: 12px; color: #94a3b8; margin-top: 4px;">Stored locally only</p>
            </div>
            <div class="setting-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="darkMode" checked> Dark Mode
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="autoSave" checked> Auto-save
                </label>
            </div>
            <div class="modal-actions">
                <button onclick="closeSettings()">Cancel</button>
                <button class="primary" onclick="saveSettings()">Save</button>
            </div>
        </div>
    </div>
    
    <!-- History Modal -->
    <div class="modal" id="historyModal">
        <div class="modal-content">
            <h2>📊 History</h2>
            <div class="history-list" id="historyList"></div>
            <div class="modal-actions">
                <button class="danger" onclick="clearHistory()">Clear All</button>
                <button onclick="closeHistory()">Close</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/keymap/vim.min.js"></script>
    
    <script>
        const state = {
            problem: null,
            timeLeft: 0,
            timer: null,
            editor: null,
            chat: []
        };
        
        const problems = [
            {
                id: 'fizzbuzz',
                title: 'FizzBuzz',
                difficulty: 'easy',
                time: 10,
                desc: 'Write a function that returns a list from 1 to n where multiples of 3 are "Fizz", multiples of 5 are "Buzz", and multiples of both are "FizzBuzz".',
                starter: {
                    python: 'def fizz_buzz(n: int) -> list[str]:\n    # Your code here\n    pass',
                    javascript: 'function fizzBuzz(n) {\n    // Your code here\n}'
                }
            },
            {
                id: 'two-sum',
                title: 'Two Sum',
                difficulty: 'easy',
                time: 15,
                desc: 'Given an array of integers and a target, return indices of two numbers that add up to target.',
                starter: {
                    python: 'def two_sum(nums: list[int], target: int) -> list[int]:\n    # Your code here\n    pass',
                    javascript: 'function twoSum(nums, target) {\n    // Your code here\n}'
                }
            },
            {
                id: 'valid-parens',
                title: 'Valid Parentheses',
                difficulty: 'medium',
                time: 20,
                desc: 'Given a string with (){}[], determine if brackets are valid (correctly opened and closed).',
                starter: {
                    python: 'def is_valid(s: str) -> bool:\n    # Your code here\n    pass',
                    javascript: 'function isValid(s) {\n    // Your code here\n}'
                }
            },
            {
                id: 'reverse',
                title: 'Reverse String',
                difficulty: 'easy',
                time: 10,
                desc: 'Reverse a string in-place (modify the input array).',
                starter: {
                    python: 'def reverse_string(s: list[str]) -> None:\n    # Your code here\n    pass',
                    javascript: 'function reverseString(s) {\n    // Your code here\n}'
                }
            },
            {
                id: 'palindrome',
                title: 'Palindrome Number',
                difficulty: 'easy',
                time: 15,
                desc: 'Check if an integer is a palindrome without converting to string.',
                starter: {
                    python: 'def is_palindrome(x: int) -> bool:\n    # Your code here\n    pass',
                    javascript: 'function isPalindrome(x) {\n    // Your code here\n}'
                }
            },
            {
                id: 'merge',
                title: 'Merge Sorted Arrays',
                difficulty: 'medium',
                time: 25,
                desc: 'Merge two sorted arrays into the first array in-place.',
                starter: {
                    python: 'def merge(nums1: list[int], m: int, nums2: list[int], n: int) -> None:\n    # Your code here\n    pass',
                    javascript: 'function merge(nums1, m, nums2, n) {\n    // Your code here\n}'
                }
            }
        ];
        
        function init() {
            const grid = document.getElementById('problemGrid');
            grid.innerHTML = problems.map(p => `
                <div class="problem-card" onclick="start('${p.id}')">
                    <h3>${p.title}</h3>
                    <span class="difficulty ${p.difficulty}">${p.difficulty.toUpperCase()}</span>
                    <p style="color: #94a3b8; font-size: 13px;">⏱ ${p.time} min</p>
                </div>
            `).join('');
            
            state.editor = CodeMirror.fromTextArea(document.getElementById('codeEditor'), {
                mode: 'python',
                theme: 'dracula',
                lineNumbers: true,
                indentUnit: 4
            });
            
            state.editor.on('change', () => {
                document.getElementById('charCount').textContent = state.editor.getValue().length + ' chars';
            });
        }
        
        function start(id) {
            const p = problems.find(x => x.id === id);
            if (!localStorage.getItem('apiKey')) {
                alert('Set your API key in settings first!');
                showSettings();
                return;
            }
            
            state.problem = p;
            state.timeLeft = p.time * 60;
            state.chat = [];
            
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('interviewScreen').classList.remove('hidden');
            document.getElementById('problemTitle').textContent = p.title;
            document.getElementById('problemMeta').textContent = `${p.difficulty} • ${p.time} min`;
            document.getElementById('problemDesc').innerHTML = `<h3>${p.title}</h3><p>${p.desc}</p>`;
            
            state.editor.setValue(p.starter.python);
            
            startTimer();
            addMsg('proctor', `Hi! You're solving "${p.title}". Read the problem and let me know when you're ready to start coding. Feel free to ask questions!`);
        }
        
        function startTimer() {
            updateTimer();
            state.timer = setInterval(() => {
                state.timeLeft--;
                updateTimer();
                if (state.timeLeft <= 0) {
                    clearInterval(state.timer);
                    alert('Time up!');
                    submitCode();
                }
            }, 1000);
        }
        
        function updateTimer() {
            const m = Math.floor(state.timeLeft / 60);
            const s = state.timeLeft % 60;
            const el = document.getElementById('timer');
            el.textContent = `${m}:${s.toString().padStart(2, '0')}`;
            if (state.timeLeft < 300) el.classList.add('warning');
        }
        
        function sendMsg() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            
            addMsg('user', msg);
            input.value = '';
            
            const msgs = document.getElementById('chatMessages');
            const typingId = 'typing-' + Date.now();
            msgs.innerHTML += `
                <div class="message" id="${typingId}">
                    <div class="avatar">P</div>
                    <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
                </div>
            `;
            msgs.scrollTop = msgs.scrollHeight;
            
            callAI(msg).then(resp => {
                document.getElementById(typingId)?.remove();
                addMsg('proctor', resp);
            });
        }
        
        function addMsg(role, text) {
            const msgs = document.getElementById('chatMessages');
            const avatar = role === 'user' ? 'You' : 'P';
            msgs.innerHTML += `
                <div class="message ${role}">
                    <div class="avatar">${avatar}</div>
                    <div class="bubble">${text}</div>
                </div>
            `;
            msgs.scrollTop = msgs.scrollHeight;
            state.chat.push({ role, text });
        }
        
        function chatKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMsg();
            }
        }
        
        async function callAI(msg) {
            const key = localStorage.getItem('apiKey');
            const provider = localStorage.getItem('apiProvider') || 'openai';
            
            const prompt = `You're an AI interview proctor. Problem: "${state.problem.title}" - ${state.problem.desc}

Code:
${state.editor.getValue()}

User: ${msg}

Be helpful but don't give away the solution.`;
            
            try {
                if (provider === 'openai') {
                    const res = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${key}`
                        },
                        body: JSON.stringify({
                            model: 'gpt-4',
                            messages: [{ role: 'user', content: prompt }],
                            max_tokens: 300
                        })
                    });
                    const data = await res.json();
                    return data.choices[0].message.content;
                } else {
                    const res = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-api-key': key,
                            'anthropic-version': '2023-06-01'
                        },
                        body: JSON.stringify({
                            model: 'claude-3-sonnet-20240229',
                            max_tokens: 300,
                            messages: [{ role: 'user', content: prompt }]
                        })
                    });
                    const data = await res.json();
                    return data.content[0].text;
                }
            } catch (e) {
                return 'Error calling AI. Check your API key.';
            }
        }
        
        async function submitCode() {
            if (!confirm('Submit solution?')) return;
            clearInterval(state.timer);
            
            document.getElementById('interviewScreen').classList.add('hidden');
            document.getElementById('reviewScreen').classList.remove('hidden');
            document.getElementById('reviewPanel').innerHTML = '<p style="text-align:center;padding:40px;">Evaluating...</p>';
            
            const eval = await evaluate();
            showReview(eval);
            saveHistory(eval);
        }
        
        async function evaluate() {
            const key = localStorage.getItem('apiKey');
            const provider = localStorage.getItem('apiProvider') || 'openai';
            
            const prompt = `Evaluate this interview solution:

Problem: ${state.problem.title}
${state.problem.desc}

Code:
${state.editor.getValue()}

Provide JSON:
{
  "scores": {"correctness": 0-4, "approach": 0-4, "quality": 0-4, "communication": 0-4},
  "strengths": ["...", "..."],
  "improvements": ["...", "..."],
  "verdict": "Pass/Borderline/Fail",
  "feedback": "..."
}`;
            
            try {
                let content;
                if (provider === 'openai') {
                    const res = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${key}`
                        },
                        body: JSON.stringify({
                            model: 'gpt-4',
                            messages: [{ role: 'user', content: prompt }],
                            max_tokens: 800
                        })
                    });
                    const data = await res.json();
                    content = data.choices[0].message.content;
                } else {
                    const res = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-api-key': key,
                            'anthropic-version': '2023-06-01'
                        },
                        body: JSON.stringify({
                            model: 'claude-3-sonnet-20240229',
                            max_tokens: 800,
                            messages: [{ role: 'user', content: prompt }]
                        })
                    });
                    const data = await res.json();
                    content = data.content[0].text;
                }
                
                const match = content.match(/\{[\s\S]*\}/);
                return match ? JSON.parse(match[0]) : fallbackEval();
            } catch (e) {
                return fallbackEval();
            }
        }
        
        function fallbackEval() {
            return {
                scores: { correctness: 3, approach: 3, quality: 3, communication: 3 },
                strengths: ['Attempted solution', 'Clean code'],
                improvements: ['Consider edge cases', 'Optimize complexity'],
                verdict: 'Borderline',
                feedback: 'Good effort! Keep practicing.'
            };
        }
        
        function showReview(e) {
            const total = Object.values(e.scores).reduce((a, b) => a + b, 0);
            const color = e.verdict === 'Pass' ? '#10b981' : e.verdict === 'Fail' ? '#ef4444' : '#f59e0b';
            
            document.getElementById('reviewPanel').innerHTML = `
                <div style="background: #1e293b; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid ${color};">
                    <h3 style="color: ${color};">Verdict: ${e.verdict}</h3>
                    <p>Score: ${total}/16</p>
                </div>
                
                <div class="score-grid">
                    <div class="score-card">
                        <div class="label">Correctness</div>
                        <div class="value">${e.scores.correctness}</div>
                    </div>
                    <div class="score-card">
                        <div class="label">Approach</div>
                        <div class="value">${e.scores.approach}</div>
                    </div>
                    <div class="score-card">
                        <div class="label">Quality</div>
                        <div class="value">${e.scores.quality}</div>
                    </div>
                    <div class="score-card">
                        <div class="label">Communication</div>
                        <div class="value">${e.scores.communication}</div>
                    </div>
                </div>
                
                <div class="feedback-section">
                    <h3>✅ Strengths</h3>
                    <ul>${e.strengths.map(s => `<li>${s}</li>`).join('')}</ul>
                </div>
                
                <div class="feedback-section">
                    <h3>📈 Improvements</h3>
                    <ul>${e.improvements.map(i => `<li>${i}</li>`).join('')}</ul>
                </div>
                
                <div class="feedback-section">
                    <h3>💬 Feedback</h3>
                    <p>${e.feedback}</p>
                </div>
                
                <div style="text-align: center; margin-top: 24px;">
                    <button class="primary" onclick="newSession()">New Problem</button>
                    <button onclick="goHome()" style="margin-left: 12px;">Home</button>
                </div>
            `;
        }
        
        function saveHistory(e) {
            const hist = JSON.parse(localStorage.getItem('history') || '[]');
            const total = Object.values(e.scores).reduce((a, b) => a + b, 0);
            hist.unshift({
                problem: state.problem.title,
                score: total,
                verdict: e.verdict,
                date: Date.now()
            });
            if (hist.length > 50) hist.pop();
            localStorage.setItem('history', JSON.stringify(hist));
        }
        
        function changeLang() {
            const lang = document.getElementById('langSelect').value;
            state.editor.setOption('mode', lang);
            state.editor.setValue(state.problem.starter[lang]);
        }
        
        function toggleVim() {
            const vim = document.getElementById('vimMode').checked;
            state.editor.setOption('keyMap', vim ? 'vim' : 'default');
        }
        
        function resetCode() {
            if (confirm('Reset code?')) {
                const lang = document.getElementById('langSelect').value;
                state.editor.setValue(state.problem.starter[lang]);
            }
        }
        
        function endSession() {
            if (confirm('End session?')) {
                clearInterval(state.timer);
                goHome();
            }
        }
        
        function newSession() {
            document.getElementById('reviewScreen').classList.add('hidden');
            document.getElementById('homeScreen').classList.remove('hidden');
        }
        
        function goHome() {
            clearInterval(state.timer);
            document.getElementById('interviewScreen').classList.add('hidden');
            document.getElementById('reviewScreen').classList.add('hidden');
            document.getElementById('homeScreen').classList.remove('hidden');
        }
        
        function showSettings() {
            document.getElementById('settingsModal').classList.add('active');
            document.getElementById('apiKey').value = localStorage.getItem('apiKey') || '';
            document.getElementById('apiProvider').value = localStorage.getItem('apiProvider') || 'openai';
        }
        
        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }
        
        function saveSettings() {
            localStorage.setItem('apiKey', document.getElementById('apiKey').value);
            localStorage.setItem('apiProvider', document.getElementById('apiProvider').value);
            closeSettings();
            alert('Saved!');
        }
        
        function showHistory() {
            const hist = JSON.parse(localStorage.getItem('history') || '[]');
            const list = document.getElementById('historyList');
            
            if (hist.length === 0) {
                list.innerHTML = '<p style="text-align:center;padding:40px;color:#94a3b8;">No sessions yet</p>';
            } else {
                list.innerHTML = hist.map(h => `
                    <div class="history-item">
                        <h4>${h.problem}</h4>
                        <div class="meta">
                            <span>Score: ${h.score}/16</span>
                            <span>${h.verdict}</span>
                            <span>${new Date(h.date).toLocaleDateString()}</span>
                        </div>
                    </div>
                `).join('');
            }
            
            document.getElementById('historyModal').classList.add('active');
        }
        
        function closeHistory() {
            document.getElementById('historyModal').classList.remove('active');
        }
        
        function clearHistory() {
            if (confirm('Clear all history?')) {
                localStorage.removeItem('history');
                closeHistory();
            }
        }
        
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
