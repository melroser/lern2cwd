    <!DOCTYPE html>
    <html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="color-scheme" content="dark light" />
        <title>ProctorCode — Interview‑grade coding practice (Mockup)</title>
        <style>
            :root {
                --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
                --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

                --topbar-h: 64px;
                --radius: 18px;

                --bg0: #070a12;
                --bg1: rgba(10, 13, 25, 0.72);
                --surface: rgba(255, 255, 255, 0.06);
                --surface2: rgba(255, 255, 255, 0.09);
                --border: rgba(255, 255, 255, 0.12);
                --border2: rgba(255, 255, 255, 0.18);

                --text: rgba(255, 255, 255, 0.92);
                --muted: rgba(255, 255, 255, 0.68);
                --faint: rgba(255, 255, 255, 0.48);

                --accent: #7c3aed;
                --accent2: #60a5fa;
                --good: #22c55e;
                --warn: #f59e0b;
                --bad: #ef4444;

                --shadow-sm: 0 10px 24px rgba(0, 0, 0, 0.25);
                --shadow: 0 28px 80px rgba(0, 0, 0, 0.45);

                --editor-bg: #0b1220;
                --editor-fg: rgba(255, 255, 255, 0.90);
                --editor-muted: rgba(255, 255, 255, 0.55);
                --editor-border: rgba(255, 255, 255, 0.08);
                --editor-accent: rgba(124, 58, 237, 0.60);

                --focus: rgba(96, 165, 250, 0.75);
            }

            html[data-theme="light"] {
                --bg0: #f6f7fb;
                --bg1: rgba(246, 247, 251, 0.74);
                --surface: rgba(15, 23, 42, 0.04);
                --surface2: rgba(15, 23, 42, 0.06);
                --border: rgba(15, 23, 42, 0.12);
                --border2: rgba(15, 23, 42, 0.18);

                --text: rgba(8, 12, 20, 0.92);
                --muted: rgba(8, 12, 20, 0.66);
                --faint: rgba(8, 12, 20, 0.46);

                --shadow-sm: 0 10px 24px rgba(2, 6, 23, 0.10);
                --shadow: 0 28px 80px rgba(2, 6, 23, 0.16);

                --editor-bg: #0b1220;
                --editor-fg: rgba(255, 255, 255, 0.90);
                --editor-muted: rgba(255, 255, 255, 0.60);
                --editor-border: rgba(255, 255, 255, 0.10);
                --editor-accent: rgba(96, 165, 250, 0.60);

                --focus: rgba(124, 58, 237, 0.50);
            }

            * {
                box-sizing: border-box;
            }

            html, body {
                height: 100%;
            }

            body {
                margin: 0;
                font-family: var(--sans);
                color: var(--text);
                overflow: hidden;
                background: var(--bg0);
            }

            .bg {
                position: fixed;
                inset: 0;
                background:
                    radial-gradient(1200px 850px at 12% 8%, rgba(124, 58, 237, 0.25), transparent 60%),
                    radial-gradient(900px 750px at 88% 12%, rgba(96, 165, 250, 0.22), transparent 56%),
                    radial-gradient(900px 650px at 50% 110%, rgba(34, 197, 94, 0.14), transparent 62%),
                    radial-gradient(1400px 900px at 50% 50%, rgba(0, 0, 0, 0.25), transparent 60%),
                    var(--bg0);
            }

            .bg::after {
                content: "";
                position: absolute;
                inset: 0;
                background:
                    repeating-linear-gradient(
                        90deg,
                        rgba(255, 255, 255, 0.030) 0px,
                        rgba(255, 255, 255, 0.030) 1px,
                        transparent 1px,
                        transparent 8px
                    ),
                    repeating-linear-gradient(
                        0deg,
                        rgba(255, 255, 255, 0.020) 0px,
                        rgba(255, 255, 255, 0.020) 1px,
                        transparent 1px,
                        transparent 10px
                    );
                opacity: 0.35;
                mix-blend-mode: overlay;
                pointer-events: none;
            }

            .app {
                position: relative;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }

            .topbar {
                height: var(--topbar-h);
                display: flex;
                align-items: center;
                border-bottom: 1px solid var(--border);
                background: var(--bg1);
                backdrop-filter: blur(14px);
                -webkit-backdrop-filter: blur(14px);
                z-index: 20;
            }

            .topbarInner {
                width: min(1240px, 100%);
                margin: 0 auto;
                padding: 0 18px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 14px;
            }

            .brand {
                display: flex;
                align-items: center;
                gap: 10px;
                cursor: pointer;
                user-select: none;
            }

            .brandMark {
                width: 34px;
                height: 34px;
                border-radius: 12px;
                display: grid;
                place-items: center;
                background: linear-gradient(135deg, var(--accent), var(--accent2));
                border: 1px solid rgba(255, 255, 255, 0.16);
                box-shadow: 0 14px 40px rgba(124, 58, 237, 0.32);
            }

            .brandText {
                display: flex;
                flex-direction: column;
                line-height: 1.1;
            }

            .brandName {
                font-weight: 820;
                letter-spacing: -0.02em;
            }

            .brandTag {
                font-size: 12px;
                color: var(--muted);
                margin-top: 2px;
            }

            .nav {
                display: flex;
                gap: 6px;
                align-items: center;
            }

            .nav .navBtn {
                border: 1px solid transparent;
                background: transparent;
                color: var(--muted);
                padding: 10px 12px;
                border-radius: 12px;
                font-weight: 720;
                font-size: 13px;
                cursor: pointer;
                transition: background 180ms ease, border-color 180ms ease, color 180ms ease;
            }

            .nav .navBtn:hover {
                background: var(--surface);
                border-color: var(--border);
                color: var(--text);
            }

            .nav .navBtn[aria-current="page"] {
                background: var(--surface2);
                border-color: var(--border2);
                color: var(--text);
            }

            .topActions {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .btn {
                border: 1px solid var(--border);
                background: var(--surface);
                color: var(--text);
                border-radius: 14px;
                padding: 10px 12px;
                font-weight: 740;
                font-size: 13px;
                cursor: pointer;
                transition: transform 80ms ease, background 180ms ease, border-color 180ms ease, filter 180ms ease;
                box-shadow: none;
            }

            .btn:hover {
                background: var(--surface2);
                border-color: var(--border2);
            }

            .btn:active {
                transform: translateY(1px);
            }

            .btn:disabled {
                opacity: 0.55;
                cursor: not-allowed;
            }

            .btnPrimary {
                background: linear-gradient(135deg, var(--accent), var(--accent2));
                border-color: transparent;
                color: white;
                box-shadow: 0 16px 42px rgba(124, 58, 237, 0.24);
            }

            .btnPrimary:hover {
                filter: brightness(1.03);
            }

            .btnQuiet {
                background: transparent;
                border-color: transparent;
                color: var(--muted);
            }

            .btnQuiet:hover {
                background: var(--surface);
                border-color: var(--border);
                color: var(--text);
            }

            .btnIcon {
                width: 42px;
                padding: 10px;
                display: grid;
                place-items: center;
            }

            .btnSmall {
                padding: 8px 10px;
                border-radius: 12px;
                font-size: 12px;
            }

            .btnRow {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                align-items: center;
            }

            .main {
                flex: 1;
                overflow: hidden;
            }

            .shell {
                width: min(1240px, 100%);
                margin: 0 auto;
                padding: 22px 18px 22px;
                height: calc(100vh - var(--topbar-h));
                overflow: auto;
            }

            .grid2 {
                display: grid;
                grid-template-columns: 1.15fr 0.85fr;
                gap: 18px;
            }

            .grid3 {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 14px;
            }

            @media (max-width: 980px) {
                .grid2 {
                    grid-template-columns: 1fr;
                }
                .grid3 {
                    grid-template-columns: 1fr;
                }
            }

            .card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                box-shadow: var(--shadow-sm);
                overflow: hidden;
            }

            .cardPad {
                padding: 16px;
            }

            .cardHeader {
                padding: 16px;
                border-bottom: 1px solid var(--border);
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                gap: 12px;
            }

            .cardTitle {
                font-weight: 840;
                letter-spacing: -0.02em;
                margin: 0;
                font-size: 16px;
            }

            .cardSub {
                color: var(--muted);
                font-size: 13px;
                margin-top: 6px;
                line-height: 1.4;
            }

            .heroTitle {
                font-size: clamp(30px, 3.2vw, 44px);
                letter-spacing: -0.03em;
                margin: 0;
                font-weight: 920;
                line-height: 1.06;
            }

            .heroLead {
                color: var(--muted);
                margin-top: 12px;
                font-size: 15px;
                line-height: 1.6;
            }

            .pill {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 6px 10px;
                border-radius: 999px;
                border: 1px solid var(--border);
                background: var(--surface);
                font-size: 12px;
                font-weight: 740;
                color: var(--muted);
            }

            .pillDot {
                width: 8px;
                height: 8px;
                border-radius: 999px;
                background: var(--faint);
            }

            .pillLive .pillDot {
                background: var(--good);
                box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.16);
            }

            .badge {
                display: inline-flex;
                align-items: center;
                padding: 6px 10px;
                border-radius: 999px;
                font-size: 12px;
                font-weight: 820;
                letter-spacing: -0.01em;
                border: 1px solid var(--border);
                background: var(--surface);
            }

            .badgeEasy { color: rgba(34, 197, 94, 0.95); border-color: rgba(34, 197, 94, 0.30); background: rgba(34, 197, 94, 0.08); }
            .badgeMed { color: rgba(245, 158, 11, 0.95); border-color: rgba(245, 158, 11, 0.30); background: rgba(245, 158, 11, 0.08); }
            .badgeHard { color: rgba(239, 68, 68, 0.95); border-color: rgba(239, 68, 68, 0.30); background: rgba(239, 68, 68, 0.08); }

            .muted {
                color: var(--muted);
            }

            .faint {
                color: var(--faint);
            }

            .statGrid {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 12px;
            }

            @media (max-width: 980px) {
                .statGrid {
                    grid-template-columns: 1fr;
                }
            }

            .statCard {
                background: linear-gradient(180deg, var(--surface), transparent);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 14px;
            }

            .statKey {
                font-size: 12px;
                font-weight: 740;
                color: var(--muted);
            }

            .statVal {
                font-size: 20px;
                font-weight: 920;
                letter-spacing: -0.02em;
                margin-top: 6px;
            }

            .divider {
                height: 1px;
                background: var(--border);
                margin: 14px 0;
            }

            .problemList {
                display: grid;
                gap: 12px;
            }

            .problemItem {
                display: grid;
                grid-template-columns: 1fr auto;
                gap: 12px;
                padding: 14px;
                border: 1px solid var(--border);
                border-radius: 16px;
                background: var(--surface);
                cursor: pointer;
                transition: transform 110ms ease, border-color 180ms ease, background 180ms ease;
            }

            .problemItem:hover {
                transform: translateY(-1px);
                border-color: var(--border2);
                background: var(--surface2);
            }

            .problemTitle {
                font-weight: 860;
                letter-spacing: -0.02em;
            }

            .problemMeta {
                margin-top: 8px;
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                align-items: center;
                color: var(--muted);
                font-size: 12px;
            }

            .tag {
                display: inline-flex;
                align-items: center;
                padding: 5px 9px;
                border-radius: 999px;
                border: 1px solid var(--border);
                background: rgba(255, 255, 255, 0.04);
                font-size: 12px;
                color: var(--muted);
                font-weight: 720;
            }

            .kpiRow {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                align-items: center;
            }

            .kpi {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 8px 10px;
                border-radius: 14px;
                border: 1px solid var(--border);
                background: rgba(255, 255, 255, 0.03);
                color: var(--muted);
                font-size: 12px;
                font-weight: 740;
            }

            .kbd {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-width: 24px;
                padding: 4px 8px;
                border-radius: 10px;
                border: 1px solid var(--border);
                background: rgba(0, 0, 0, 0.16);
                color: var(--text);
                font-size: 12px;
                font-weight: 820;
                font-family: var(--mono);
            }

            .input, select, textarea {
                width: 100%;
                border: 1px solid var(--border);
                background: var(--surface);
                color: var(--text);
                border-radius: 14px;
                padding: 10px 12px;
                font-size: 13px;
                outline: none;
            }

            textarea {
                font-family: var(--sans);
                min-height: 90px;
                resize: vertical;
            }

            .input:focus, select:focus, textarea:focus, .btn:focus {
                outline: none;
            }

            :focus-visible {
                outline: 2px solid var(--focus);
                outline-offset: 2px;
            }

            .formRow {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            @media (max-width: 980px) {
                .formRow {
                    grid-template-columns: 1fr;
                }
            }

            /* Session layout */
            .sessionShell {
                height: calc(100vh - var(--topbar-h));
                padding: 14px;
                overflow: hidden;
            }

            .sessionLayout {
                height: 100%;
                display: grid;
                grid-template-columns: clamp(520px, var(--leftPct, 62%), 76%) 12px 1fr;
                grid-template-rows: 1fr 12px var(--consoleH, 240px);
                border-radius: calc(var(--radius) + 2px);
                overflow: hidden;
                border: 1px solid var(--border);
                background: rgba(255, 255, 255, 0.02);
                box-shadow: var(--shadow);
            }

            .pane {
                min-height: 0;
                min-width: 0;
                background: rgba(255, 255, 255, 0.02);
            }

            .paneLeft { grid-column: 1; grid-row: 1; }
            .paneRight { grid-column: 3; grid-row: 1; }
            .paneBottom { grid-column: 1 / 4; grid-row: 3; }

            .dividerV {
                grid-column: 2;
                grid-row: 1;
                cursor: col-resize;
                background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
                border-left: 1px solid rgba(255, 255, 255, 0.06);
                border-right: 1px solid rgba(255, 255, 255, 0.06);
                position: relative;
            }

            .dividerV::after {
                content: "";
                position: absolute;
                left: 50%;
                top: 50%;
                width: 6px;
                height: 56px;
                transform: translate(-50%, -50%);
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.12);
            }

            .dividerH {
                grid-column: 1 / 4;
                grid-row: 2;
                cursor: row-resize;
                background: linear-gradient(90deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
                border-top: 1px solid rgba(255, 255, 255, 0.06);
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
                position: relative;
            }

            .dividerH::after {
                content: "";
                position: absolute;
                left: 50%;
                top: 50%;
                width: 56px;
                height: 6px;
                transform: translate(-50%, -50%);
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.12);
            }

            .paneFrame {
                height: 100%;
                display: flex;
                flex-direction: column;
                min-height: 0;
            }

            .paneHeader {
                padding: 14px 14px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
                background: rgba(255, 255, 255, 0.02);
            }

            .paneHeader .titleRow {
                display: flex;
                flex-direction: column;
                gap: 4px;
                min-width: 0;
            }

            .paneHeader .paneTitle {
                font-weight: 880;
                letter-spacing: -0.02em;
                font-size: 14px;
                margin: 0;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .paneHeader .paneMeta {
                font-size: 12px;
                color: var(--muted);
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                align-items: center;
            }

            .paneBody {
                min-height: 0;
                flex: 1;
                overflow: auto;
                padding: 14px;
            }

            .tabs {
                display: inline-flex;
                gap: 4px;
                padding: 4px;
                border-radius: 14px;
                border: 1px solid var(--border);
                background: rgba(255, 255, 255, 0.03);
            }

            .tab {
                border: 1px solid transparent;
                background: transparent;
                color: var(--muted);
                padding: 8px 10px;
                border-radius: 12px;
                font-weight: 820;
                font-size: 12px;
                cursor: pointer;
                transition: background 150ms ease, border-color 150ms ease, color 150ms ease;
            }

            .tab:hover {
                background: rgba(255, 255, 255, 0.05);
                color: var(--text);
            }

            .tab[aria-selected="true"] {
                background: rgba(255, 255, 255, 0.08);
                border-color: rgba(255, 255, 255, 0.12);
                color: var(--text);
            }

            .promptBlock p {
                margin: 0 0 12px 0;
                line-height: 1.55;
                color: var(--text);
                font-size: 13px;
            }

            .promptBlock ul {
                margin: 0;
                padding-left: 16px;
                color: var(--muted);
                line-height: 1.6;
                font-size: 13px;
            }

            .promptBlock code {
                font-family: var(--mono);
                font-size: 12px;
                color: rgba(255, 255, 255, 0.88);
                background: rgba(255, 255, 255, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.10);
                padding: 2px 6px;
                border-radius: 10px;
            }

            .editorCard {
                border: 1px solid var(--border);
                border-radius: var(--radius);
                overflow: hidden;
                background: rgba(255, 255, 255, 0.03);
            }

            .editorTop {
                padding: 12px 12px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 10px;
                border-bottom: 1px solid var(--border);
            }

            .editorTop .left {
                display: flex;
                align-items: center;
                gap: 10px;
                min-width: 0;
            }

            .filePill {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 7px 10px;
                border-radius: 999px;
                border: 1px solid rgba(255, 255, 255, 0.12);
                background: rgba(0, 0, 0, 0.18);
                color: rgba(255, 255, 255, 0.86);
                font-size: 12px;
                font-weight: 820;
                font-family: var(--mono);
            }

            .autosave {
                font-size: 12px;
                color: var(--muted);
                display: inline-flex;
                gap: 8px;
                align-items: center;
                white-space: nowrap;
            }

            .autosaveDot {
                width: 8px;
                height: 8px;
                border-radius: 999px;
                background: var(--good);
                opacity: 0.85;
            }

            .editorShell {
                display: grid;
                grid-template-columns: 56px 1fr;
                height: 440px;
                background: var(--editor-bg);
                border-top: 1px solid var(--editor-border);
            }

            .gutter {
                padding: 14px 10px;
                border-right: 1px solid var(--editor-border);
                color: var(--editor-muted);
                font-family: var(--mono);
                font-size: 12px;
                line-height: 1.6;
                text-align: right;
                user-select: none;
                overflow: hidden;
            }

            .codeArea {
                padding: 14px 14px;
                border: none;
                outline: none;
                resize: none;
                background: transparent;
                color: var(--editor-fg);
                font-family: var(--mono);
                font-size: 13px;
                line-height: 1.6;
                tab-size: 4;
                white-space: pre;
                overflow: auto;
            }

            .editorFooter {
                padding: 12px 12px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 10px;
                border-top: 1px solid var(--border);
                background: rgba(255, 255, 255, 0.02);
            }

            .hintChips {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                align-items: center;
            }

            .chip {
                border: 1px solid var(--border);
                background: rgba(255, 255, 255, 0.03);
                color: var(--muted);
                padding: 8px 10px;
                border-radius: 999px;
                font-weight: 820;
                font-size: 12px;
                cursor: pointer;
                transition: background 150ms ease, border-color 150ms ease, color 150ms ease, transform 80ms ease;
            }

            .chip:hover {
                background: rgba(255, 255, 255, 0.06);
                border-color: var(--border2);
                color: var(--text);
            }

            .chip:active {
                transform: translateY(1px);
            }

            .chatList {
                display: flex;
                flex-direction: column;
                gap: 12px;
                padding: 14px;
                min-height: 0;
                overflow: auto;
            }

            .msg {
                display: flex;
                gap: 10px;
                align-items: flex-start;
            }

            .msg.user {
                flex-direction: row-reverse;
            }

            .avatar {
                width: 32px;
                height: 32px;
                border-radius: 12px;
                display: grid;
                place-items: center;
                font-weight: 920;
                font-size: 12px;
                border: 1px solid var(--border);
                background: rgba(255, 255, 255, 0.04);
                color: var(--text);
                flex: 0 0 auto;
            }

            .avatar.proctor {
                background: rgba(124, 58, 237, 0.14);
                border-color: rgba(124, 58, 237, 0.30);

                const $ = (sel, root = document) => root.querySelector(sel);
                const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
                const clamp = (n, min, max) => Math.max(min, Math.min(max, n));
                const pad2 = (n) => String(n).padStart(2, "0");

                const formatTime = (secs) => {
                    const s = Math.max(0, Math.floor(secs));

                    return `${pad2(mm)}:${pad2(ss)}`;
                };

                const uid = (prefix) => `${prefix}_${Math.random().toString(16).slice(2)}_${Date.now().toString(16)}`;

                const storage = {
                    read(key, fallback) {
                        try {
                            const raw = localStorage.getItem(key);
                            if (!raw) return fallback;
                            return JSON.parse(raw);
                        } catch {
                            return fallback;
                        }
                    },
                    write(key, value) {
                        try {
                            localStorage.setItem(key, JSON.stringify(value));
                        } catch {
                            // ignore
                        }
                    },
                    remove(key) {
                        try {
                            localStorage.removeItem(key);
                        } catch {
                            // ignore
                        }
                    },
                };

                const deepMerge = (base, patch) => {
                    if (!patch || typeof patch !== "object") return structuredClone(base);
                    const out = structuredClone(base);
                    const stack = [{ out, patch }];
                    while (stack.length) {
                        const { out: o, patch: p } = stack.pop();
                        for (const k of Object.keys(p)) {
                            const pv = p[k];
                            const ov = o[k];
                            if (pv && typeof pv === "object" && !Array.isArray(pv)) {
                                if (!ov || typeof ov !== "object" || Array.isArray(ov)) o[k] = {};
                                stack.push({ out: o[k], patch: pv });
                            } else {
                                o[k] = pv;
                            }
                        }
                    }
                    return out;
                };

                const defaults = {
                    version: 1,
                    theme: null,
                    ui: {

                        consoleH: 240,
                        chatCollapsed: false,
                        consoleCollapsed: false,
                        mobileTab: "editor",

                        vimMode: false,
                        keyMode: "session",

                };

                let persist = deepMerge(defaults, storage.read(APP.persistKey, {}));

                if (!persist.theme) {
                    persist.theme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
                }
                document.documentElement.dataset.theme = persist.theme;

                const problems = [
                    {
                        id: "fizzbuzz",

                        difficultyClass: "badgeEasy",

                        tags: ["loops", "strings"],

                        prompt:

                        ],
                        constraints: ["1 ≤ n ≤ 10^4", "Return an array/list of strings"],
                        followUps: ["How would you stream results instead of building an array?"],
                        scaffold: {
                            JavaScript:
`/**

 */
function fizzBuzz(n) {
    // TODO
    return [];
}`,
                            Python:
`from typing import List

def fizzBuzz(n: int) -> List[str]:
    # TODO
    return []`,

                        ideal: {
                            JavaScript:
`function fizzBuzz(n) {

                        },
                        hints: [
                            "Start with a loop from 1..n, build a string for each number, and push it into an array.",
                            "Instead of nested ifs, build the label by concatenating \"Fizz\" and/or \"Buzz\".",

                        ],
                        jsTests: [
                            { name: "n=1", args: [1], expected: ["1"], comparator: "deepEqual" },
                            { name: "n=5", args: [5], expected: ["1", "2", "Fizz", "4", "Buzz"], comparator: "deepEqual" },
                            { name: "n=15 (last item)", args: [15], expected: "FizzBuzz", comparator: "fizzbuzzLast" },
                        ],
                    },
                    {
                        id: "two-sum",
                        title: "Two Sum",
                        difficulty: "Easy",
                        difficultyClass: "badgeEasy",
                        timeLimitSeconds: 15 * 60,
                        tags: ["arrays", "hash map"],
                        fn: { JavaScript: "twoSum", Python: "twoSum" },
                        prompt:
                            "Given an array of integers nums and an integer target, return indices of the two numbers such that they add up to target.\n\n" +
                            "You may assume each input would have exactly one solution, and you may not use the same element twice.\n" +
                            "You can return the answer in any order.",
                        examples: [
                            { input: "nums = [2,7,11,15], target = 9", output: "[0,1]" },

                        constraints: ["2 ≤ nums.length ≤ 10^4", "-10^9 ≤ nums[i] ≤ 10^9", "-10^9 ≤ target ≤ 10^9"],
                        followUps: ["Can you do it in one pass?", "What’s the time/space complexity trade-off?"],
                        scaffold: {
                            JavaScript:
`/**
 * @param {number[]} nums
 * @param {number} target
 * @returns {number[]}
 */
function twoSum(nums, target) {
    // TODO
    return [];
}`,
                            Python:
`from typing import List

def twoSum(nums: List[int], target: int) -> List[int]:
    # TODO
    return []`,
                        },
                        ideal: {

`function twoSum(nums, target) {

    for (let i = 0; i < nums.length; i++) {
        const need = target - nums[i];
        if (seen.has(need)) return [seen.get(need), i];
        seen.set(nums[i], i);

                        },

                    },
                    {
                        id: "valid-parentheses",
                        title: "Valid Parentheses",
                        difficulty: "Easy",

                        timeLimitSeconds: 15 * 60,
                        tags: ["stack", "parsing"],

                        scaffold: {
                            JavaScript:
`/**
 * @param {string} s
 * @returns {boolean}
 */

    // TODO

}`,

`def isValid(s: str) -> bool:
    # TODO
    return True`,

                        ideal: {
                            JavaScript:
`function isValid(s) {
    const pairs = { ")": "(", "]": "[", "}": "{" };
    const stack = [];
    for (const ch of s) {
        if (ch in pairs) {
            if (!stack.length || stack[stack.length - 1] !== pairs[ch]) return false;

            stack.push(ch);

    return stack.length === 0;
